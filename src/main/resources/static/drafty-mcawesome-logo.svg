<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="210" height="70">
  <defs>
    <radialGradient id="burst" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#ffeb3b"/>
    </radialGradient>
  </defs>

  <!-- Background burst -->
  <polygon points="210,5 230,55 290,35 250,72 305,88 250,98 285,140 220,112 210,145 200,112 135,140 170,98 115,88 170,72 130,35 190,55" fill="url(#burst)" opacity="0.6"/>

  <!-- Action lines -->
  <g stroke="#e53935" stroke-width="2" opacity="0.4">
    <line x1="25" y1="25" x2="60" y2="38"/>
    <line x1="360" y1="25" x2="395" y2="15"/>
    <line x1="15" y1="70" x2="40" y2="70"/>
    <line x1="380" y1="75" x2="410" y2="70"/>
  </g>

  <!-- SCORESHEET -->
  <g transform="translate(210, 38)">
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="32" font-weight="900" fill="#000" transform="translate(2, 2) rotate(-3)">SCORESHEET</text>
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="32" font-weight="900" fill="#1565c0" stroke="#ffffff" stroke-width="3" paint-order="stroke" transform="rotate(-3)">SCORESHEET</text>
  </g>

  <!-- DRAFTY -->
  <g transform="translate(210, 78)">
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="38" font-weight="900" fill="#000" transform="translate(2, 2) rotate(2)">DRAFTY</text>
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="38" font-weight="900" fill="#d32f2f" stroke="#ffffff" stroke-width="3" paint-order="stroke" transform="rotate(2)">DRAFTY</text>
  </g>

  <!-- McAWESOME -->
  <g transform="translate(210, 118)">
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="30" font-weight="900" font-style="italic" fill="#000" transform="translate(2, 2) rotate(-2)">McAWESOME</text>
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="30" font-weight="900" font-style="italic" fill="#1565c0" stroke="#ffffff" stroke-width="3" paint-order="stroke" transform="rotate(-2)">McAWESOME</text>
  </g>

  <!-- Comic dots -->
  <circle cx="40" cy="48" r="6" fill="#ffeb3b" stroke="#000" stroke-width="1"/>
  <circle cx="380" cy="52" r="5" fill="#ffeb3b" stroke="#000" stroke-width="1"/>
</svg>